<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Cấp Khóa Tuyệt Đối</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #fff0f3;
            --main-color: #ff758f;
            --main-light: #ffccd5;
            --text-dark: #594246;
            --tele-color: #ffb3c1;
            --admin-color: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 117, 143, 0.2);
        }

        body {
            margin: 0; background: var(--bg); color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
            cursor: pointer;
        }

        /* Hiệu ứng bong bóng trái tim mờ ảo bay lơ lửng phía sau */
        .heart-bg {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            z-index: 1; overflow: hidden; pointer-events: none;
        }
        .heart-bubble {
            position: absolute; bottom: -10%; color: rgba(255, 117, 143, 0.18);
            font-size: 14px; animation: flyUp 12s linear infinite;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(50px) rotate(360deg); opacity: 0; }
        }

        /* Hào quang hồng mềm mại trung tâm */
        body::before {
            content: ''; position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,182,193,0.7) 0%, rgba(255,240,245,0) 70%);
            filter: blur(40px); border-radius: 50%; opacity: 0.8; z-index: 0;
        }

        .container {
            width: 85vw; max-width: 380px; background: var(--glass);
            border: 1px solid var(--border); border-radius: 40px;
            padding: 45px 25px; text-align: center;
            backdrop-filter: blur(30px); 
            box-shadow: 0 25px 60px rgba(255, 77, 109, 0.08);
            z-index: 10; animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ip-badge {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            padding: 8px 14px; border-radius: 14px;
            font-size: 10px; font-weight: 900; color: var(--main-color);
            letter-spacing: 0.5px; backdrop-filter: blur(10px);
            z-index: 100; box-shadow: 0 4px 15px rgba(255, 117, 143, 0.08);
        }

        .tele-group {
            position: fixed; bottom: 105px; right: 20px;
            display: flex; flex-direction: column; gap: 12px;
            z-index: 1000;
        }

        .tele-btn {
            width: 48px; height: 48px;
            background: var(--tele-color);
            color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 20px;
            box-shadow: 0 6px 15px rgba(255, 179, 193, 0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #fff;
            position: relative;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }

        .admin-btn { background: var(--admin-color); box-shadow: 0 6px 15px rgba(255, 77, 109, 0.4); animation-delay: 0.2s; }
        .tele-btn:nth-child(3) { animation-delay: 0.4s; background: #ffccd5; color: var(--main-color); }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .tele-btn:hover { transform: scale(1.12) rotate(6deg) !important; animation-play-state: paused; }

        .tele-btn::before {
            content: attr(data-label);
            position: absolute; right: 60px;
            background: var(--text-dark); color: #fff; padding: 6px 12px;
            border-radius: 8px; font-size: 10px; font-weight: 700;
            white-space: nowrap; opacity: 0; transition: 0.3s;
            pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .tele-btn:hover::before { opacity: 1; }

        /* Giao diện thanh nhạc kiểu TRÁI TIM CUTE mới */
        .music-player {
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            width: 270px; background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border); border-radius: 25px;
            padding: 10px 16px; display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(15px); z-index: 100;
            box-shadow: 0 8px 25px rgba(255, 117, 143, 0.08);
        }

        .music-heart-icon {
            font-size: 22px; color: var(--main-color);
            animation: beat 1.2s infinite ease-in-out;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.18); }
            60% { transform: scale(0.92); }
        }

        .music-body { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .music-title { font-size: 10px; font-weight: 900; color: var(--text-dark); letter-spacing: 0.3px; text-transform: uppercase; }
        .music-author { font-size: 9px; color: #a68a8f; font-weight: 600; }
        
        .progress-container { width: 100%; height: 6px; background: #ffe3e8; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff99ac, var(--main-color)); border-radius: 10px; transition: width 0.1s linear; }
        
        .status-header { display: inline-block; padding: 6px 16px; background: #fff0f3; color: var(--main-color); border-radius: 50px; font-size: 10px; font-weight: 900; margin-bottom: 20px; border: 1px solid rgba(255, 117, 143, 0.25); letter-spacing: 0.5px; }
        h1 { font-size: 23px; font-weight: 900; margin: 0; color: var(--text-dark); letter-spacing: -0.2px; }
        
        .key-display { background: rgba(255, 255, 255, 0.6); border-radius: 24px; padding: 28px 10px; margin: 25px 0; border: 2px dashed rgba(255, 117, 143, 0.3); }
        .key-text { font-size: 26px; font-weight: 900; color: var(--main-color); letter-spacing: 2px; font-family: monospace; text-shadow: 0 2px 4px rgba(255,117,143,0.1); }
        
        .copy-btn { background: linear-gradient(135deg, #ff94a9, #ff5277); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 20px; font-family: 'Montserrat'; font-size: 13px; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(255, 82, 119, 0.25); }
        .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 82, 119, 0.4); }
        
        .info-box { background: rgba(255, 255, 255, 0.6); padding: 12px; border-radius: 16px; border: 1px solid var(--border); }
    </style>
</head>
